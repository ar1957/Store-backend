version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build
      - npm prune --production
      # Verify .ebextensions is present before packaging
      - echo "=== Verifying .ebextensions ===" && ls -la .ebextensions/

artifacts:
  files:
    - ".medusa/**/*"
    - "node_modules/**/*"
    - "package.json"
    - ".ebextensions/**/*"
    - "Procfile"
  discard-paths: no
