version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm ci

  build:
    commands:
      - npm run build
      - npm ci --omit=dev

artifacts:
  files:
    - ".medusa/**/*"
    - "node_modules/**/*"
    - "package.json"
    - "medusa-config.js"
    - ".ebextensions/**/*"
    - "Procfile"
  discard-paths: no